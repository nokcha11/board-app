<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ================= MAIN ================= */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 0;
    background: url("images/pattern.png");
    background-size: cover;
    min-height: calc(100vh - 140px);
}

/* ================= 컨테이너 ================= */
.container {
    width: 90%;
    max-width: 1200px;
    display: flex;
    justify-content: center;
}

/* ================= 로그인 박스 ================= */
.login-box {
    width: 100%;
    max-width: 360px;
    background: rgba(15, 27, 51, 0.9);
    padding: 45px 28px;
    border-radius: 12px;
    border: 1px solid #1f3b66;
}

/* 제목 */
.login-box h2 {
    text-align: center;
    color: #4aa3ff;
    margin-bottom: 25px;
    font-size: 20px;
}

/* ================= 입력창 ================= */
.login-box input {
    width: 100%;
    padding: 11px;
    margin-bottom: 15px;
    border: 1px solid #1f3b66;
    border-radius: 6px;
    background: #0b1220;
    color: #fff;
    outline: none;
    box-sizing: border-box;
}

.login-box input:focus {
    border-color: #4aa3ff;
}

/* ================= 버튼 ================= */
.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4aa3ff;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    background: #2f8fff;
}

</style>

</head>

<body>

<!-- ================= 상단 ================= -->
<header>
    <h1>MY WEBSITE</h1>

    <nav>
        <a href="index.html">메인</a>
        <a href="login.html">로그인</a>
        <a href="join.html">회원가입</a>
        <a href="board.html">게시판</a>
        <a href="admin.html">회원관리</a>
    </nav>
</header>

<!-- ================= 중앙 ================= -->
<main>

    <div class="container">
        <div class="login-box">

            <h2>로그인</h2>

            <form>
                <input type="text" placeholder="아이디">
                <input type="password" placeholder="패스워드">

                <button type="submit">로그인</button>
            </form>

        </div>
    </div>

</main>

<!-- ================= 하단 ================= -->
<footer>
    © 2026 MY WEBSITE | All Rights Reserved | Contact: admin@site.com
</footer>

</body>
</html>
